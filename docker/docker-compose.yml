x-env-file: &env_file
  - .env.development.local
  - .env.local
  - docker/auth/zitadel-credentials.env

x-app: &app
  image: hmis-warehouse:5.2
  build:
    context: .
    dockerfile: docker/app/Dockerfile
    target: dev-build
    args:
      RUBY_VERSION: 3.3.8
      BUNDLER_VERSION: "2.7.2"
      USER_ID: ${USER_ID:-1001}
      GROUP_ID: ${GROUP_ID:-1001}
      BUILD_TAG: 3.3.8-slim-bookworm
  environment: &env
    AWS_REGION: ${AWS_REGION:-us-east-1}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    AWS_SECURITY_TOKEN: ${AWS_SECURITY_TOKEN:-}
    AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    EAGER_LOAD: ${EAGER_LOAD:-false}
    NODE_ENV: ${NODE_ENV:-development}
    BOOTSNAP_CACHE_DIR: /bundle/bootsnap
    WEBPACKER_DEV_SERVER_HOST: webpacker
    HISTFILE: /app/log/.bash_history
    PSQL_HISTFILE: /app/log/.psql_history
    EDITOR: vi
    CHROMEDRIVER_VERSION: 79.0.3945.36
    GROVER_NO_SANDBOX: "true"
    BUNDLE_FORCE_RUBY_PLATFORM: "true"
    KUBE_CONFIG_PATH: ${KUBE_CONFIG_PATH:-/home/app-user/.kube/config}
    K8S_API_HOST_AND_PORT: ${K8S_API_HOST_AND_PORT:-}
    # Comma-separated list of valid JWT audiences. Should include both:
    # - hmis-warehouse (for warehouse oauth2-proxy)
    # - hmis-frontend (for HMIS oauth2-proxy)
    # Defaults to both if not set
    IDP_AUD: ${IDP_AUD:-hmis-warehouse,hmis-frontend}
    # Needs to match /app/docker/auth/dev.oauth2-proxy-warehouse.yaml providers -> clientSecret and
    # Needs to match /app/docker/auth/dev.oauth2-proxy-warehouse.cfg cookie_secret
    JWT_SECRET: ${JWT_SECRET:-"dtm0zv-OaNMLiq2V00I1IpIFv_ZCsP_m-V0FYubBpLg="}
    JWT_ALGORITHM: ${JWT_ALGORITHM:-RS256}
    # Internal connections use Docker network hostname 'dex'
    # Issuer must match what browsers see (https://dex.dev.test/dex) for token validation
    ISS_URL: ${ISS_URL:-https://dex.dev.test/dex}
    JWKS_URL: ${JWKS_URL:-http://dex:4443/dex/keys}

  env_file: *env_file

x-backend: &backend
  <<: *app
  stdin_open: true
  tty: true
  volumes:
    # NOTE: you may need to run `docker-compose run -u 0 shell chown -R app-user:app-user /bundle /app /node_modules` to fix permission issues
    - .:/app:cached
    - rails_cache_bookworm:/app/tmp/cache
    - bundle_bookworm:/bundle
    - /usr/local/share/ca-certificates:/usr/local/share/ca-certificates
    - /etc/ssl/certs:/etc/ssl/certs
    - node_modules_bookworm:/node_modules

services:
  shell:
    <<: *backend
    profiles:
      - manual
    command: /bin/bash
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  spec:
    <<: *backend
    profiles:
      - manual
    command: /bin/bash
    entrypoint: "/usr/bin/entrypoint.spec.sh"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    env_file:
      - .env.local
      - .env.test
    environment:
      <<: *env
      CHROMIUM_PATH: /usr/bin/chromium
      CHROME_DEBUGGING_PORT: ${CHROME_DEBUGGING_PORT:-9223}
      CHROME_DEBUGGING_PROXY_PORT: ${CHROME_DEBUGGING_PROXY_PORT:-9222}

  console:
    <<: *backend
    profiles:
      - manual
    # entrypoint: ''
    stdin_open: true
    tty: true
    command: bundle exec rails console
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  dj:
    <<: *backend
    command: ./bin/rake jobs:work
    entrypoint: ""
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  # once we're fully on EKS, we can refactor this into the main dj service.
  dj-eks:
    <<: *backend
    profiles:
      - eks
    entrypoint: "tini -- /usr/bin/entrypoint.dj-eks-test.sh"
    command: "delayed_job run --pool=*:1"
    ports:
      # visit localhost:34533/metrics
      - "${DJ_METRICS_PORT:-34533}:9292"
    expose:
      - "9292"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9292/metrics"]
      interval: 60s
      timeout: 3s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  yarn:
    <<: *backend
    container_name: hmis-warehouse-yarn
    stdin_open: true
    tty: true
    command: yarn build --watch
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
  oauth2-proxy-warehouse:
    labels:
      - traefik.enable=true
      - traefik.http.routers.hmis-warehouse-oauth2.rule=Host(`hmis-warehouse.dev.test`)
      - traefik.http.routers.hmis-warehouse-oauth2.entrypoints=web-secure
      - traefik.http.routers.hmis-warehouse-oauth2.service=hmis-warehouse-oauth2
      - traefik.http.routers.hmis-warehouse-oauth2.tls=true
      - traefik.http.services.hmis-warehouse-oauth2.loadbalancer.server.port=4180
    container_name: oauth2-proxy-warehouse
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.12.0
    command: --alpha-config /oauth2-proxy-warehouse.yaml --config /oauth2-proxy-warehouse.cfg
    hostname: hmis-warehouse.dev.test
    extra_hosts:
      - "dex.dev.test:host-gateway"
    volumes:
      - "./docker/auth/dev.oauth2-proxy-warehouse.cfg:/oauth2-proxy-warehouse.cfg"
      - "./docker/auth/dev.oauth2-proxy-warehouse.yaml:/oauth2-proxy-warehouse.yaml"
    environment:
      <<: *env
      FQDN: hmis-warehouse.dev.test
      VIRTUAL_HOST: hmis-warehouse.dev.test
      VIRTUAL_PORT: 4180
    ports:
      - 4180:4180/tcp
    depends_on:
      dex:
        condition: service_healthy
  oauth2-proxy-hmis:
    labels:
      - traefik.enable=true
      - traefik.http.routers.hmis-frontend-oauth2.rule=Host(`hmis.dev.test`)
      - traefik.http.routers.hmis-frontend-oauth2.entrypoints=web-secure
      - traefik.http.routers.hmis-frontend-oauth2.service=hmis-frontend-oauth2
      - traefik.http.routers.hmis-frontend-oauth2.tls=true
      - traefik.http.services.hmis-frontend-oauth2.loadbalancer.server.port=4181
    container_name: oauth2-proxy-hmis
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.12.0
    command: --alpha-config /oauth2-proxy-hmis.yaml --config /oauth2-proxy-hmis.cfg
    hostname: hmis.dev.test
    extra_hosts:
      - "internal-warehouse.dev.test:host-gateway"
      - "host.docker.internal:host-gateway"
      - "dex.dev.test:host-gateway"
    volumes:
      - "./docker/auth/dev.oauth2-proxy-hmis.cfg:/oauth2-proxy-hmis.cfg"
      - "./docker/auth/dev.oauth2-proxy-hmis.yaml:/oauth2-proxy-hmis.yaml"
    environment:
      <<: *env
      FQDN: hmis.dev.test
      VIRTUAL_HOST: hmis.dev.test
      VIRTUAL_PORT: 4181
    ports:
      - 4181:4181/tcp
    depends_on:
      dex:
        condition: service_healthy
  oauth2-proxy-hmis-backend:
    labels:
      - traefik.enable=true
      - traefik.http.routers.hmis-backend-oauth2.rule=Host(`hmis-backend.dev.test`)
      - traefik.http.routers.hmis-backend-oauth2.entrypoints=web-secure
      - traefik.http.routers.hmis-backend-oauth2.service=hmis-backend-oauth2
      - traefik.http.routers.hmis-backend-oauth2.tls=true
      - traefik.http.services.hmis-backend-oauth2.loadbalancer.server.port=4182
    container_name: oauth2-proxy-hmis-backend
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.12.0
    command: --alpha-config /oauth2-proxy-hmis-backend.yaml --config /oauth2-proxy-hmis-backend.cfg
    hostname: hmis-backend.dev.test
    extra_hosts:
      - "internal-warehouse.dev.test:host-gateway"
      - "host.docker.internal:host-gateway"
      - "dex.dev.test:host-gateway"
    volumes:
      - "./docker/auth/dev.oauth2-proxy-hmis-backend.cfg:/oauth2-proxy-hmis-backend.cfg"
      - "./docker/auth/dev.oauth2-proxy-hmis-backend.yaml:/oauth2-proxy-hmis-backend.yaml"
    environment:
      <<: *env
      FQDN: hmis-backend.dev.test
      VIRTUAL_HOST: hmis-backend.dev.test
      VIRTUAL_PORT: 4182
    ports:
      - 4182:4182/tcp
    depends_on:
      dex:
        condition: service_healthy
  dex-db-init:
    image: postgres:17.5-bookworm
    container_name: dex-db-init
    command: >
      bash -c "psql -h db -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'dex'\" | grep -q 1 || psql -h db -U postgres -c 'CREATE DATABASE dex'"
    environment:
      PGPASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  dex:
    labels:
      - traefik.enable=true
      - traefik.http.routers.dex.rule=Host(`dex.dev.test`)
      - traefik.http.routers.dex.entrypoints=web-secure
      - traefik.http.routers.dex.tls=true
      - traefik.http.services.dex.loadbalancer.server.port=4443
      - traefik.http.services.dex.loadbalancer.server.scheme=http
    container_name: dex
    # image: dexidp/dex:latest-alpine
    image: ghcr.io/dexidp/dex:v2.44.0
    # Source Zitadel credentials at runtime before starting Dex
    command: >
      sh -c '
        if [ -f /auth/zitadel-credentials.env ]; then
          echo "Loading Zitadel credentials..."
          export $$(grep -v "^#" /auth/zitadel-credentials.env | xargs)
        fi
        dex serve /dex.yaml
      '
    hostname: dex
    volumes:
      - "./docker/auth/dev.dex.yaml:/dex.yaml"
      - "./docker/auth:/auth:ro"
    env_file: *env_file
    environment:
      <<: *env
      FQDN: dex.dev.test
      VIRTUAL_HOST: dex.dev.test
      VIRTUAL_PORT: 4443
    ports:
      - 4443:4443/tcp
    depends_on:
      db:
        condition: "service_healthy"
      dex-db-init:
        condition: service_completed_successfully
      zitadel-setup:
        condition: service_completed_successfully
    # oauth2 proxy kept failing intermittently, added this health check
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "4443"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    <<: *backend
    container_name: hmis-warehouse-web
    stdin_open: true
    tty: true
    command: bin/rails server -b 0.0.0.0
    ports:
      - "3000"
      - "9394"
    expose:
      - "3000"
      - "9394"
    environment:
      <<: *env
    hostname: internal-warehouse.dev.test
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      yarn:
        condition: service_started
      oauth2-proxy-warehouse:
        condition: service_started
      oauth2-proxy-hmis:
        condition: service_started
      oauth2-proxy-hmis-backend:
        condition: service_started
      dex:
        condition: service_healthy

  # To transition from a previous major version to pg17, run `bash ./docker/pg17/upgrade.sh`
  db_previous:
    build:
      context: docker/pg16
    container_name: db_previous
    image: warehousepg:16
    profiles:
      - manual
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_MULTIPLE_EXTENSIONS: postgis,hstore
      PGPASSWORD: postgres
      PGUSER: postgres
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -d postgres'"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - ${DB_DATA_VOLUME_PREVIOUS:-dbdata_pg16}:/var/lib/postgresql/data
    ports:
      - 5432
    expose:
      - 5432

  # This should no longer need to be overridden for ARM processors
  db:
    build:
      context: docker/pg17
      shm_size: 1g
    container_name: hmis-warehouse-db
    image: warehousepg:17
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_MULTIPLE_EXTENSIONS: postgis,hstore
      PGPASSWORD: postgres
      PGUSER: postgres
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -d postgres'"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      # Name each new postgres major version explicitly (dbdata_pg17 when we get to that)
      # You may want to store your db data locally rather than in a docker volume
      # to do that, set DB_DATA_VOLUME in your env or use a docker override file
      # For example:
      #   DB_DATA_VOLUME=./dev/db_data
      - ${DB_DATA_VOLUME:-dbdata_pg17}:/var/lib/postgresql/data
      - ./tmp/dumps:/tmp/dumps
      - ./db:/mnt
    ports:
      - "${DBPORT:-15432}:5432"
    expose:
      - 5432
    stop_grace_period: 30s
    shm_size: 1g # used during vacuum operations

  redis:
    container_name: hmis-warehouse-redis
    image: redis:alpine
    volumes:
      - redis:/data
    expose:
      - 6379

  sftp:
    container_name: hmis-warehouse-sftp
    build:
      context: docker/sftp
    volumes: []
    # I took this out because it has the wrong permissions and I couldn't
    # upload anything, and the one spec file that uses it seems disabled.
    #- ./tmp/sftp_spec:/home/user/sftp

  # See config/storage.yml for setup
  minio:
    container_name: s3
    image: minio/minio
    volumes:
      - ./dev/minio/data:/data
      - ./dev/minio/certs:/certs
    hostname: s3.dev.test
    environment:
      MINIO_ROOT_USER: local_access_key
      MINIO_ROOT_PASSWORD: local_secret_key
    ports:
      - 9000:9000
      - 9001:9001 # enable for UI access
    command: server --certs-dir /certs /data --console-address ":9001"
    labels:
      - traefik.enable=${TRAEFIK_ENABLED:-false}
      - traefik.http.routers.minio.entrypoints=web
      - traefik.http.routers.minio.rule=Host(`${MINIO_DOMAIN:-s3.dev.test}`)
      - traefik.http.services.minio_https.loadbalancer.server.port=9000
      - traefik.http.routers.minio_https.rule=Host(`${MINIO_DOMAIN:-s3.dev.test}`)
      - traefik.http.routers.minio_https.tls=true
      - traefik.http.routers.minio_https.entrypoints=web-secure
      - traefik.http.middlewares.minio_https.redirectscheme.scheme=https
      - traefik.http.routers.minio.middlewares=op_https

  # Zitadel IDP services
  # Automatically configures Dex integration on first startup
  zitadel-db-init:
    image: postgres:17.5-bookworm
    container_name: zitadel-db-init
    command: >
      bash -c "psql -h db -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'zitadel'\" | grep -q 1 || psql -h db -U postgres -c 'CREATE DATABASE zitadel'"
    environment:
      PGPASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  zitadel:
    restart: unless-stopped
    image: ghcr.io/zitadel/zitadel:latest
    container_name: op-zitadel
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters"
    environment:
      ZITADEL_EXTERNALDOMAIN: op-zitadel.dev.test
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALSECURE: false
      ZITADEL_TLS_ENABLED: false

      # Database connection (using main db container)
      ZITADEL_DATABASE_POSTGRES_HOST: db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable

      # Login client for V2 login UI
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel-config/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: false
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Login Client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2035-01-01T00:00:00Z"

      # Login V2 settings
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: false
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: http://op-zitadel.dev.test:3000/ui/v2/login
      ZITADEL_OIDC_DEFAULTLOGINURLV2: http://op-zitadel.dev.test:3000/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: http://op-zitadel.dev.test:3000/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: http://op-zitadel.dev.test:3000/ui/v2/login/login?samlRequest=

      # SMTP configuration (mailhog)
      ZITADEL_FIRSTINSTANCE_SMTPCONFIGURATION_SMTP_HOST: mailhog:1025
      ZITADEL_FIRSTINSTANCE_SMTPCONFIGURATION_SMTP_USER: ""
      ZITADEL_FIRSTINSTANCE_SMTPCONFIGURATION_SMTP_PASSWORD: ""
      ZITADEL_FIRSTINSTANCE_SMTPCONFIGURATION_TLS: false
      ZITADEL_FIRSTINSTANCE_SMTPCONFIGURATION_FROM: noreply@op-zitadel.dev.test
      ZITADEL_FIRSTINSTANCE_SMTPCONFIGURATION_FROMNAME: Open Path IDP

      # Initial organization and admin user
      ZITADEL_FIRSTINSTANCE_ORG_NAME: openpath
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: AdminPassword1!

      # Service account for automated setup
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel-config/admin.pat
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: setup-admin
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Automated Setup Admin
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2035-01-01T00:00:00Z"
    healthcheck:
      test: [CMD, /app/zitadel, ready]
      interval: 10s
      timeout: 60s
      retries: 5
      start_period: 20s
    user: "0"
    volumes:
      - ./docker/auth:/zitadel-config:delegated
    ports:
      - "8080:8080"
      - "3001:3000"
    hostname: op-zitadel.dev.test
    networks:
      default:
        aliases:
          - op-zitadel.dev.test
    depends_on:
      db:
        condition: service_healthy
      zitadel-db-init:
        condition: service_completed_successfully

  zitadel-login:
    restart: unless-stopped
    image: ghcr.io/zitadel/zitadel-login:latest
    container_name: op-zitadel-login
    environment:
      ZITADEL_API_URL: http://op-zitadel.dev.test:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel-config/login-client.pat
    network_mode: service:zitadel
    user: "0"
    volumes:
      - ./docker/auth:/zitadel-config:ro
    depends_on:
      zitadel:
        condition: service_healthy
        restart: false

  # Automated Zitadel configuration for Dex integration
  # Runs once on first startup, skips if already configured
  zitadel-setup:
    image: curlimages/curl:latest
    container_name: zitadel-setup
    user: "0"
    volumes:
      - ./docker/auth:/auth
      - ./docker/zitadel/setup.sh:/setup.sh:ro
    environment:
      ZITADEL_URL: http://op-zitadel.dev.test:8080
      AUTH_DIR: /auth
      PAT_FILE: /auth/admin.pat
      CREDENTIALS_FILE: /auth/zitadel-credentials.env
    command: /setup.sh
    depends_on:
      zitadel:
        condition: service_healthy
    restart: "no"

volumes:
  bundle_bookworm:
  node_modules_bookworm:
  rails_cache_bookworm:
  dbdata:
  dbdata_pg13:
  dbdata_pg16:
  dbdata_pg17:
  redis:
  ngrok:
networks:
  default:
    name: development
    external: true
