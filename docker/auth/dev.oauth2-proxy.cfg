email_domains="*"
# upstreams=["http://warehouse.dev.test:3000"]
cookie_domains=[".dev.test", "oauth2-proxy.dev.test", "hmis-warehouse.dev.test"] # Required so cookie can be read on all subdomains.
whitelist_domains=[".dev.test", "oauth2-proxy.dev.test", "hmis-warehouse.dev.test"] # Required to allow redirection back to original requested target.
cookie_refresh="1h"
cookie_expire="12h" # When this time is reached, the session is closed and the user will be logged out

# dex provider
redirect_url="https://hmis-warehouse.dev.test/oauth2/callback"

# These paths don't require authentication
# Match everything except /style_guide and its subpaths
skip_auth_routes=[
  "!=^/style_guide",
  # "^/$",
  # "^/sign_in",
  # "^/sign_out",
  # "^/favicon.ico",
  # "^/icon.",
  # "^/healthz",
  # "^/system/status/*",
  # "^/mini-profiler-resources/*",
  # "public_agencies",
  # "public_files/*",
  # "dev-assets/*",
]
skip_provider_button=true
