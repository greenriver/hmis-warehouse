# These paths don't require authentication
# Match everything except /style_guide and its subpaths
skip_auth_routes=[
  "^/$",  # root
  "^/[^s].*",  # paths starting with / but not /s
  "^/s[^t].*",  # paths starting with /s but not /st
  "^/st[^y].*",  # paths starting with /st but not /sty
  "^/sty[^l].*",  # paths starting with /sty but not /styl
  "^/styl[^e].*",  # paths starting with /styl but not /style
  "^/style[^_].*",  # paths starting with /style but not /style_
  "^/style_[^g].*",  # paths starting with /style_ but not /style_g
  "^/style_g[^u].*",  # paths starting with /style_g but not /style_gu
  "^/style_gu[^i].*",  # paths starting with /style_gu but not /style_gui
  "^/style_gui[^d].*",  # paths starting with /style_gui but not /style_guid
  "^/style_guid[^e].*",  # paths starting with /style_guid but not /style_guide
  "^/style_guide[^/].*",  # paths starting with /style_guide but not followed by /
