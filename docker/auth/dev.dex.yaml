# https://github.com/oauth2-proxy/oauth2-proxy/blob/master/contrib/local-environment/dex.yaml
# This configuration is intended to be used with the docker compose testing
# environment.
# This should configure Dex to run on port 4443 and provides a static login
issuer: https://dex.dev.test/dex
storage:
  type: postgres
  config:
    host: db
    port: 5432
    database: dex
    user: postgres
    password: postgres
    ssl:
      mode: disable
web:
  http: 0.0.0.0:4443
oauth2:
  skipApprovalScreen: true
  alwaysShowLoginScreen: false
expiry:
  signingKeys: "4h"
  idTokens: "1h"
connectors:
  - type: github
    id: github_idp
    name: "Login with GitHub"
    config:
      clientID: ${GITHUB_IDP_CLIENT_ID}
      clientSecret: ${GITHUB_IDP_CLIENT_SECRET}
      redirectURI: https://dex.dev.test/dex/callback
  # Zitadel connector - requires running ./docker/zitadel/setup.sh first
  # and adding the generated credentials to .env.local
  # Until configured, this connector will appear but won't work
  - type: oidc
    id: zitadel
    name: Open Path Account
    config:
      issuer: http://op-zitadel.dev.test:8080
      clientID: ${ZITADEL_IDP_CLIENT_ID}
      clientSecret: ${ZITADEL_IDP_CLIENT_SECRET}
      redirectURI: https://dex.dev.test/dex/callback
      useLoginAsID: true
      scopes:
        - openid
        - email
        - profile
      getUserInfo: true
      # insecureSkipEmailVerified allows login even if issuer is unreachable during config load
      insecureSkipEmailVerified: true
staticClients:
  - id: hmis-warehouse
    name: "HMIS Warehouse"
    redirectURIs:
      # These redirect URIs point to the `--redirect-url` for OAuth2 proxy.
      - "https://hmis-warehouse.dev.test/oauth2/callback"
    secret: "${JWT_SECRET}"
    trustedPeers:
      - hmis-frontend
    public: true
  - id: hmis-frontend
    name: "HMIS Frontend"
    redirectURIs:
      - "https://hmis.dev.test/oauth2/callback"
      - "https://hmis-backend.dev.test/oauth2/callback"
    secret: "${JWT_SECRET}"
    trustedPeers:
      - hmis-warehouse
    public: true
enablePasswordDB: true
staticPasswords:
  - email: "admin@example.com"
    # bcrypt hash of the string "password"
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
    username: "admin example"
    userID: "08a8684b-db88-4b73-90a9-3cd1661f5465"
    claims:
      given_name: "Sample"
      family_name: "Admin"
  - email: "user@example.com"
    # bcrypt hash of the string "password"
    # bash $(echo password | htpasswd -BinC 10 admin | cut -d: -f2)
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
    username: "user example"
    userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
    claims:
      given_name: "User"
      family_name: "Example"
