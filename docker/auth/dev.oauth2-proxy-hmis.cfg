cookie_secret="dtm0zv-OaNMLiq2V00I1IpIFv_ZCsP_m-V0FYubBpLg=" # See https://oauth2-proxy.github.io/oauth2-proxy/configuration/overview/#generating-a-cookie-secret
email_domains="*"
cookie_domains=[".dev.test"] # Required so cookie can be read on all subdomains.
whitelist_domains=[".dev.test"] # Required to allow redirection back to original requested target.
cookie_refresh="1h"
cookie_expire="12h" # When this time is reached, the session is closed and the user will be logged out

# dex provider
redirect_url="https://hmis.dev.test/oauth2/callback"
ssl_insecure_skip_verify=true

# Return 401 for unauthenticated API requests instead of redirecting to login
# This prevents CORS errors when the frontend tries to check authentication status
skip_jwt_bearer_tokens=true

# These paths don't require authentication by oauth2-proxy
# For API endpoints, we let them pass through and the backend validates JWT
skip_auth_routes=[
  "^/$",  # Homepage
  "^/favicon.*",  # Favicons
  "^/icon.*",  # Icons
  "^/assets/.*",  # Static assets (built)
  "^/public/.*",  # Public folder
  "^/locales/.*",  # Translation files
  "^/@.*",  # All Vite special paths (/@vite/, /@react-refresh, /@id/, etc.)
  "^/node_modules/.*",  # Dev dependencies (dev only)
  "^/src/.*",  # Source files (dev only)
  "^/hmis/user\\.json$",  # User authentication check - backend validates JWT
  "^/hmis/app_settings$",  # App settings - backend validates JWT
]
skip_provider_button=true
