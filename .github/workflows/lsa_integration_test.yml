name: LSA Integration Test

# Runs the FY2026 HUD LSA end-to-end against a real SQL Server 2022 service
# container (test mode, bundled HMIS fixtures) and compares the output to
# fixtures. This is the automated replacement for the manual LSA smoke test.
on:
  pull_request:
  push:
    branches:
      - stable
      - main
      - staging
      - production
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-lsa-integration
  cancel-in-progress: true

env:
  # Postgres / Redis / MinIO config (mirrors rails_tests.yml)
  CLIENT: test
  ENABLE_HMIS_API: "true"
  DATABASE_ADAPTER: postgresql
  DATABASE_APP_DB_TEST: warehouse_app_test
  DATABASE_DB_TEST: warehouse_test
  DATABASE_APP_DB: warehouse_app_test
  DATABASE_HOST: postgres
  DATABASE_PASS: postgres
  DATABASE_USER: postgres
  DATABASE_WAREHOUSE_DB_TEST: warehouse_test
  DEFAULT_FROM: greenriver.testing@mailinator.com
  DISABLE_SPRING: 1
  ENCRYPTION_KEY: strongEncryptionstrongEncryptionstrongEncryption
  FQDN: openpath.host
  HEALTH_DATABASE_ADAPTER: postgresql
  HEALTH_DATABASE_DB_TEST: health_test
  HEALTH_DATABASE_HOST: postgres
  HEALTH_DATABASE_PASS: postgres
  HEALTH_DATABASE_USER: postgres
  HEALTH_FROM: greenriver.testing@mailinator.com
  HOSTNAME: openpath.host
  MINIO_ENDPOINT: http://minio:9000
  USE_MINIO_ENDPOINT: true
  PORT: 80
  RAILS_ENV: test
  CACHE_HOST: redis
  CACHE_PORT: 6379
  CACHE_DB: 1
  REPORTING_DATABASE_ADAPTER: postgresql
  REPORTING_DATABASE_DB_TEST: reporting_test
  REPORTING_DATABASE_HOST: postgres
  REPORTING_DATABASE_PASS: postgres
  REPORTING_DATABASE_USER: postgres
  WAREHOUSE_DATABASE_ADAPTER: postgis
  WAREHOUSE_DATABASE_DB_TEST: warehouse_test
  WAREHOUSE_DATABASE_HOST: postgres
  WAREHOUSE_DATABASE_PASS: postgres
  WAREHOUSE_DATABASE_USER: postgres
  WAREHOUSE_DATABASE_DB: warehouse_test
  HEALTH_DATABASE_DB: health_test
  REPORTING_DATABASE_DB: reporting_test
  LOG_LEVEL: INFO
  TODO_OR_DIE_LOG_ONLY: true
  AWS_ACCESS_KEY_ID: local_access_key
  AWS_SECRET_ACCESS_KEY: local_secret_key
  AWS_REGION: us-east-1
  # LSA integration test config: point the generator at the mssql service and
  # skip all AWS RDS API calls. NO_LSA_RDS is intentionally left unset so the
  # real Rds/SqlServerBase are loaded (spec helpers, which force it on, are not
  # loaded by a rake task).
  LSA_LOCAL_SQL_SERVER: "true"
  LSA_DB_HOST: mssql
  RDS_IDENTIFIER: lsaci
  RDS_USERNAME: sa
  RDS_PASSWORD: LsaCi!Passw0rd
  RDS_AWS_ACCESS_KEY_ID: dummy
  RDS_DB_INSTANCE_CLASS: db.t3.medium
  RDS_DB_ENGINE: sqlserver-web
  RDS_SECURITY_GROUP_ID: sg-dummy
  RDS_KMS_KEY_ID: kms-dummy

jobs:
  lsa_integration_test:
    runs-on: ubuntu-24.04
    container: ruby:3.4.9-slim-bookworm

    permissions:
      contents: read
      packages: read

    services:
      postgres:
        image: index.docker.io/postgis/postgis@sha256:1d7869b7f4dc799835cc8106061f10bcde94377da4704cd508511b78b9005c02 # 17-3.5-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --name pg_container
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: index.docker.io/library/redis@sha256:02419de7eddf55aa5bcf49efb74e88fa8d931b4d77c07eff8a6b2144472b6952 # alpine
        ports:
          - 6379:6379
      minio:
        image: ghcr.io/greenriver/openpath-minio:1.0
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          MINIO_ACCESS_KEY: local_access_key
          MINIO_SECRET_KEY: local_secret_key
        ports:
          - "9000:9000"
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: LsaCi!Passw0rd
          MSSQL_PID: Developer
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P LsaCi!Passw0rd -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 30s
        ports:
          - 1433:1433

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: "Container Setup"
        id: container-setup
        uses: ./.github/workflows/container_setup
        with:
          additional_packages: libpq-dev

      - name: "App setup"
        run: |
          cp config/secrets.yml.sample config/secrets.yml
          mkdir -p app/assets/stylesheets/theme/styles
          touch app/assets/stylesheets/theme/styles/_variables.scss
          cp .rspec.sample .rspec
          cp config/database.yml.ci config/database.yml

      - name: Prepare test db
        run: |
          pg_isready -h postgres -U postgres
          echo "postgres:*:*:postgres:postgres" > ~/.pgpass
          chmod 600 ~/.pgpass
          bin/db_prep

      # LSA sample data (input + expected output) is gitignored; fetch it from S3
      # like the datalab testkit. The bucket path must contain sample_hmis_export/,
      # sample_results/, and sample_hic_results/ subdirectories.
      - name: "Fetch LSA sample data"
        uses: keithweaver/aws-s3-github-action@46dd0263ee582cbb2e81ad88209198d26d7a67c6 # v1.0.0
        with:
          command: cp
          source: ${{ secrets.AWS_S3_ACTION_BUCKET }}${{ vars.AWS_S3_ACTIONS_LSA_SAMPLE_PATH_FY_2026 }}
          destination: ./drivers/hud_lsa/spec/fixtures/files/lsa/fy2026/
          aws_access_key_id: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}
          aws_region: us-east-1
          flags: --recursive

      - name: Run LSA integration test
        run: bundle exec rake driver:hud_lsa:ci_integration_test

      - name: Upload generated LSA output
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: lsa-ci-output
          path: tmp/lsa_ci_output/**
          if-no-files-found: warn
          retention-days: 7
