    #     # Install dependencies
    #     apt-get update
    #     apt-get install -y build-essential imagemagick chromium-browser \
    #       postgresql-client-16 postgresql-client-17 \
    #       nodejs yarn freetds-dev libicu-dev libcurl4-openssl-dev \
    #       libmagic-dev libxml2-dev libxslt1-dev libpq-dev \
    #       libgeos-dev libheif1 fonts-dejavu fonts-freefont-ttf \
    #       lftp tmux poppler-utils libyaml-dev libffi-dev

    #     echo "localhost:5432:*:postgres:postgres" > ~/.pgpass
    #     chmod 600 ~/.pgpass

    - name: Install gems
      shell: bash
      run: |
        # Install pg gem with correct configuration
        # gem install pg -- --with-pg-config=/usr/bin/pg_config
        gem install bundler --version=2.6.3
        bundle config set --local without 'production staging'
        bundle install --jobs 10 --retry 3

    - name: Cache Node.js modules
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node_modules-${{ hashFiles('**/yarn.lock') }}

    - name: Install Node.js modules
      shell: ${{ inputs.shell }}
      run: yarn install --frozen-lockfile
