name: 'Container Setup'
description: 'Sets up the container for running tests'

inputs:
  additional_packages:
    description: 'Additional packages to install'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        # Function to retry commands
        retry() {
          local max_attempts=3
          local delay=5
          local attempt=1
          local exitcode=0

          while (( attempt <= max_attempts ))
          do
            if "$@"
            then
              exitcode=0
              break
            else
              exitcode=$?
              echo "Command failed (attempt $attempt/$max_attempts). Retrying in $delay seconds..."
              sleep $delay
              attempt=$(( attempt + 1 ))
              delay=$(( delay * 2 ))
            fi
          done

          return $exitcode
        }

        # Add PostgreSQL repository
        retry apt-get update
        retry apt-get install -y software-properties-common
        # From https://www.postgresql.org/download/linux/debian/
        install -d /usr/share/postgresql-common/pgdg
        retry curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
        . /etc/os-release
        sh -c "echo 'deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $VERSION_CODENAME-pgdg main' > /etc/apt/sources.list.d/pgdg.list"

        # Install NodeJS and Yarn repositories
        retry curl -fsSL https://deb.nodesource.com/setup_18.x | bash -s -- -y
        retry curl -fsSL https://dl.yarnpkg.com/debian/pubkey.gpg | gpg --dearmor -o /etc/apt/trusted.gpg.d/yarn.gpg
        echo "deb https://dl.yarnpkg.com/debian/ stable main" | tee /etc/apt/sources.list.d/yarn.list

        retry apt-get update

        # Install packages with retry
        retry apt-get install -y --no-install-recommends \
          build-essential \
          curl \
          fonts-dejavu \
          fonts-freefont-ttf \
          freetds-dev \
          git \
          lftp \
          libcurl4-openssl-dev \
          libffi-dev \
          libgeos-dev \
          libheif1 \
          libicu-dev \
          libmagic-dev \
          libpq-dev \
          libxml2-dev \
          libxslt1-dev \
          libyaml-dev \
          nodejs \
          poppler-utils \
          postgresql-client-16 \
          postgresql-client-17 \
          python3 \
          python3-pip \
          python3-venv \
          tmux \
          unzip \
          ${{ inputs.additional_packages }}
        apt-get clean

    - name: Install AWS CLI
      shell: bash
      run: |
        curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -q awscliv2.zip
        ./aws/install --update
        rm -rf aws awscliv2.zip

    - name: Install Node.js dependencies
      shell: bash
      run: |
        npm install -g yarn

    # ensure changed-files can read repo files from git
    - name: Configure Git Safe Directory
      shell: ${{ inputs.shell }}
      run: git config --global --add safe.directory /__w/hmis-warehouse/hmis-warehouse

    # - name: Set up dependencies
    #   shell: ${{ inputs.shell }}
