## Call from the caller workflow like so:
# - name: Checkout
#     uses: actions/checkout@v4
# - name: 'Container Setup'
#   id: container-setup
#   uses: ./.github/workflows/container_setup

name: "Container Setup"
description: "Sets up the container for running tests"

inputs:
  additional_packages:
    description: "Additional packages to install"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        # Function to retry commands
        retry() {
          local max_attempts=3
          local delay=5
          local attempt=1
          local exitcode=0

          while (( attempt <= max_attempts ))
          do
            if "$@"
            then
              exitcode=0
              break
            else
              exitcode=$?
              echo "Command failed (attempt $attempt/$max_attempts). Retrying in $delay seconds..."
              sleep $delay
              attempt=$(( attempt + 1 ))
              delay=$(( delay * 2 ))
            fi
          done

          return $exitcode
        }

        run_as_root() {
          if [ "$(id -u)" -eq 0 ]
          then
            "$@"
          else
            sudo "$@"
          fi
        }

        # Add PostgreSQL repository
        retry run_as_root apt-get update
        retry run_as_root apt-get install -y software-properties-common curl ca-certificates lsb-release gnupg
        # From https://www.postgresql.org/download/linux/debian/
        run_as_root install -d /usr/share/postgresql-common/pgdg
        retry curl -o /tmp/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
        run_as_root mv /tmp/apt.postgresql.org.asc /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
        . /etc/os-release
        run_as_root bash -c "echo 'deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $VERSION_CODENAME-pgdg main' > /etc/apt/sources.list.d/pgdg.list"

        # Install NodeJS and Yarn repositories
        retry run_as_root bash -c "curl -fsSL https://deb.nodesource.com/setup_18.x | bash -s -- -y"
        retry curl -fsSL https://dl.yarnpkg.com/debian/pubkey.gpg -o /tmp/yarn-pubkey.gpg
        run_as_root gpg --dearmor -o /etc/apt/trusted.gpg.d/yarn.gpg /tmp/yarn-pubkey.gpg
        rm /tmp/yarn-pubkey.gpg
        run_as_root bash -c "echo 'deb https://dl.yarnpkg.com/debian/ stable main' > /etc/apt/sources.list.d/yarn.list"

        retry run_as_root apt-get update

        # Install packages with retry
        retry run_as_root apt-get install -y --no-install-recommends \
          build-essential \
          dbus \
          packagekit \
          packagekit-tools \
          fonts-dejavu \
          fonts-freefont-ttf \
          freetds-dev \
          git \
          lftp \
          libcurl4-openssl-dev \
          libffi-dev \
          libgeos-dev \
          libheif1 \
          libicu-dev \
          libmagic-dev \
          libpq-dev \
          libxml2-dev \
          libxslt1-dev \
          libyaml-dev \
          nodejs \
          poppler-utils \
          postgresql-client-16 \
          postgresql-client-17 \
          python3 \
          python3-pip \
          python3-venv \
          software-properties-common \
          unzip \
          zlib1g-dev \
          ${{ inputs.additional_packages }}
        run_as_root apt-get clean

    - name: Install AWS CLI
      shell: bash
      run: |
        run_as_root() {
          if [ "$(id -u)" -eq 0 ]
          then
            "$@"
          else
            sudo "$@"
          fi
        }

        curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -q awscliv2.zip
        run_as_root ./aws/install --update
        rm -rf aws awscliv2.zip

    - name: Install Node.js dependencies
      shell: bash
      run: |
        run_as_root() {
          if [ "$(id -u)" -eq 0 ]
          then
            "$@"
          else
            sudo "$@"
          fi
        }

        run_as_root npm install -g yarn

    # ensure changed-files can read repo files from git
    - name: Configure Git Safe Directory
      shell: bash
      run: git config --global --add safe.directory /__w/hmis-warehouse/hmis-warehouse

    - name: Install gems
      shell: bash
      run: |
        run_as_root() {
          if [ "$(id -u)" -eq 0 ]
          then
            "$@"
          else
            sudo "$@"
          fi
        }

        # Install pg gem with correct configuration
        # gem install pg -- --with-pg-config=/usr/bin/pg_config
        run_as_root gem install bundler --version=2.6.3
        bundle config set --local without 'production staging'
        bundle install --jobs 10 --retry 3

    - name: Cache Node.js modules
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node_modules-${{ hashFiles('**/yarn.lock') }}

    - name: Install Node.js modules
      shell: bash
      run: yarn install --frozen-lockfile
