## Call from the caller workflow like so:
# - name: Checkout
#     uses: actions/checkout@v4
# - name: 'Container Setup'
#   id: container-setup
#   uses: ./.github/workflows/container_setup

name: 'Container Setup'
description: 'Sets up the container for running tests'

inputs:
  additional_packages:
    description: 'Additional packages to install'
    required: false
    default: ''
  install_chromium:
    description: 'Install a version-pinned Chromium/chromium-common/chromium-sandbox for headless browser tests (see DSA-6378-1)'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        # Function to retry commands
        retry() {
          local max_attempts=3
          local delay=5
          local attempt=1
          local exitcode=0

          while (( attempt <= max_attempts ))
          do
            if "$@"
            then
              exitcode=0
              break
            else
              exitcode=$?
              echo "Command failed (attempt $attempt/$max_attempts). Retrying in $delay seconds..."
              sleep $delay
              attempt=$(( attempt + 1 ))
              delay=$(( delay * 2 ))
            fi
          done

          return $exitcode
        }

        # Add PostgreSQL repository
        retry apt-get update
        retry apt-get install -y software-properties-common curl ca-certificates lsb-release gnupg
        # From https://www.postgresql.org/download/linux/debian/
        install -d /usr/share/postgresql-common/pgdg
        retry curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
        . /etc/os-release
        sh -c "echo 'deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $VERSION_CODENAME-pgdg main' > /etc/apt/sources.list.d/pgdg.list"

        # Install NodeJS repository
        retry curl -fsSL https://deb.nodesource.com/setup_24.x | bash -s -- -y

        retry apt-get update

        # Install packages with retry
        retry apt-get install -y --no-install-recommends \
          build-essential \
          dbus \
          packagekit \
          packagekit-tools \
          fonts-dejavu \
          fonts-freefont-ttf \
          freetds-dev \
          git \
          lftp \
          libcurl4-openssl-dev \
          libffi-dev \
          libgeos-dev \
          libheif1 \
          libicu-dev \
          libmagic-dev \
          libpq-dev \
          libxml2-dev \
          libxslt1-dev \
          libyaml-dev \
          libproj-dev \
          proj-bin \
          nodejs \
          poppler-utils \
          postgresql-client-16 \
          postgresql-client-17 \
          python3 \
          python3-pip \
          python3-venv \
          software-properties-common \
          unzip \
          zlib1g-dev \
          ${{ inputs.additional_packages }}
        apt-get clean

    - name: Install pinned Chromium
      if: ${{ inputs.install_chromium == 'true' }}
      shell: bash
      env:
        # Debian's bookworm-security chromium package is a rolling apt install with no
        # version pin, so it silently picks up whatever build is currently published.
        # DSA-6378-1 (2026-07-05) bumped it to 150.0.7871.46-1~deb12u1, which crashed on
        # every launch (headless or not) with a Trace/breakpoint trap — Debian Bug
        # #1141488 (https://bugs.debian.org/cgi-bin/bugreport.cgi?bug=1141488). Fixed
        # upstream in 150.0.7871.100-1~deb12u1, superseded again by
        # 150.0.7871.124-1~deb12u1 (current as of 2026-07-16). Pinned via
        # snapshot.debian.org so this stays reproducible and immune to Debian
        # superseding it again before we choose to re-bump.
        CHROMIUM_VERSION: 150.0.7871.124-1~deb12u1
        CHROMIUM_SNAPSHOT_BASE: https://snapshot.debian.org/archive/debian-security/20260716T114414Z/pool/updates/main/c/chromium
        # snapshot.debian.org addresses every archived file by its SHA1 (see the
        # "hash" field at https://snapshot.debian.org/mr/package/chromium/<version>/allfiles),
        # so this is the checksum to verify each download against, not a SHA256.
        CHROMIUM_SHA1: ba4f545dce13c3e483643e3439dd32cd56ca2347
        CHROMIUM_COMMON_SHA1: 040b6c14b08d6e721683918e0a551b2128f9055d
        CHROMIUM_SANDBOX_SHA1: aaa0a8c256e5e064667dd7b4ac7c93c5f7460819
      run: |
        retry() {
          local max_attempts=3
          local delay=5
          local attempt=1
          local exitcode=0

          while (( attempt <= max_attempts ))
          do
            if "$@"
            then
              exitcode=0
              break
            else
              exitcode=$?
              echo "Command failed (attempt $attempt/$max_attempts). Retrying in $delay seconds..."
              sleep $delay
              attempt=$(( attempt + 1 ))
              delay=$(( delay * 2 ))
            fi
          done

          return $exitcode
        }

        tmp_dir=$(mktemp -d)
        for pkg in chromium chromium-common chromium-sandbox; do
          retry curl -sL --fail -o "$tmp_dir/${pkg}.deb" "$CHROMIUM_SNAPSHOT_BASE/${pkg}_${CHROMIUM_VERSION}_amd64.deb"
        done

        verify_sha1() {
          local file=$1
          local expected=$2
          local actual
          actual=$(sha1sum "$file" | cut -d' ' -f1)
          if [[ "$actual" != "$expected" ]]; then
            echo "::error::SHA1 mismatch for $file: expected $expected, got $actual"
            exit 1
          fi
        }

        verify_sha1 "$tmp_dir/chromium.deb" "$CHROMIUM_SHA1"
        verify_sha1 "$tmp_dir/chromium-common.deb" "$CHROMIUM_COMMON_SHA1"
        verify_sha1 "$tmp_dir/chromium-sandbox.deb" "$CHROMIUM_SANDBOX_SHA1"

        retry apt-get install -y --no-install-recommends "$tmp_dir"/*.deb
        apt-mark hold chromium chromium-common chromium-sandbox
        rm -rf "$tmp_dir"

    - name: Install AWS CLI
      shell: bash
      run: |
        curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -q awscliv2.zip
        ./aws/install --update
        rm -rf aws awscliv2.zip

    - name: Install Node.js dependencies
      shell: bash
      run: |
        npm install -g yarn

    # ensure changed-files can read repo files from git
    - name: Configure Git Safe Directory
      shell: bash
      run: git config --global --add safe.directory /__w/hmis-warehouse/hmis-warehouse

    - name: Install gems
      shell: bash
      run: |
        # Install pg gem with correct configuration
        # gem install pg -- --with-pg-config=/usr/bin/pg_config
        gem install bundler --version=2.7.2
        bundle config set --local without 'production staging'
        bundle install --jobs 10 --retry 3

    - name: Cache Node.js modules
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node_modules-${{ hashFiles('**/yarn.lock') }}

    - name: Install Node.js modules
      shell: bash
      run: yarn install --frozen-lockfile
